<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>YANG TODO</title>
    <link rel="stylesheet" href="todo-list-style.css" />
  </head>
  <body>
    <div class="todo">
      <h2 class="todo__title">YANG TODO</h2>
      <div class="todo__input">
        <input type="text" id="todo-input" placeholder="할 일을 입력하세요" />
        <button id="add-btn" style="font-size: 14px">할 일 추가</button>
      </div>
      <div class="todo__list">
        <div class="todo__section">
          <h3>할 일</h3>
          <ul id="todo-list"></ul>
        </div>
        <div class="todo__section">
          <h3>완료</h3>
          <ul id="done-list"></ul>
        </div>
      </div>
    </div>
    <script src="@/dist/todo-list.js"></script>
  </body>
</html>
